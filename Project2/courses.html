<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="mobile-nav.css">
    <link rel="stylesheet" href="student-nav.css">
    <link rel="stylesheet" href="courses.css">
    <script type="module" src="auth.js"></script>
    <script type="module" src="data-store.js"></script>
    <script src="nav-avatar.js" defer></script>
    <script src="courses.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Courses — Talent Flow</title>
</head>
<body data-profile-page="student">

    <div id="toast-container"></div>

    <!-- ══ NAV ══ -->
    <nav>
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
            </svg>
            <span>Talent Flow</span>
        </div>
        <div class="nav-right">
            <span class="nav-role">Student</span>
            <div class="avatar">
                <img id="nav-avatar-img" src="" alt="Profile">
            </div>
            <button type="button" class="nav-logout-btn" id="logoutBtn">Log Out</button>
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Open navigation menu">
                <span class="hb-bar hb-top"></span>
                <span class="hb-bar hb-mid"></span>
                <span class="hb-bar hb-bot"></span>
            </button>
        </div>
    </nav>

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="../student-profile.html" class="sb-brand">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
                </svg>
                Talent Flow
            </a>
            <button class="sb-close-btn" aria-label="Close menu">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <span class="sb-section">Navigation</span>

        <a href="../student-profile.html" class="sidebar-link" data-tip="My Profile" title="My Profile">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
            </svg>
            <span class="sb-label">My Profile</span>
        </a>

        <a href="courses.html" class="sidebar-link active" data-tip="Courses" title="Courses">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 20.25h12m-7.5-3v3m3-3v3m-10.125-3h17.25c.621 0 1.125-.504 1.125-1.125V4.875c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125Z"/>
            </svg>
            <span class="sb-label">Courses</span>
        </a>

        <div class="sb-footer">
            <img src="" alt="Student" class="sb-footer-avatar" id="sbFooterAvatar">
            <div class="sb-footer-info">
                <div class="sb-footer-name" id="sbFooterName"></div>
                <div class="sb-footer-role" id="sbFooterRole"></div>
            </div>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ══ MAIN ══ -->
    <main class="content">
        <div class="scourses-shell">
            <div class="scourses-head">
                <div>
                    <h1>Browse Courses</h1>
                    <p class="scourses-sub">Find your next course and start learning.</p>
                </div>
                <div class="scourses-search">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                    <input type="text" id="courseSearch" placeholder="Search courses or instructors…">
                </div>
            </div>

            <div class="scourse-grid" id="courseGrid"></div>

            <div class="scourses-empty" id="emptyState" hidden>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 20.25h12m-7.5-3v3m3-3v3m-10.125-3h17.25c.621 0 1.125-.504 1.125-1.125V4.875c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125Z" />
                </svg>
                <p id="emptyStateText">No published courses yet — check back soon.</p>
            </div>
        </div>
    </main>

    <script src="mobile-nav.js"></script>
</body>
</html>
